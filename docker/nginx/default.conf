# ============================================================
# Barbershop SaaS — Nginx Reverse Proxy + Security
# ============================================================
# Serves: Frontend static files + proxies to Backend API.
# Security: HSTS, CSP, X-Frame-Options, Rate Limiting.

upstream backend_api {
    least_conn;
    server backend:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream backend_admin {
    least_conn;
    server backend:8000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ---- Rate Limiting Zones ----
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=50r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ---- Security Headers Map ----
map $scheme $hsts_header {
    https   "max-age=63072000; includeSubDomains; preload";
    default "";
}

# ---- Tenant Subdomain Map (future) ----
map $host $tenant_subdomain {
    ~^(?<sub>.+)\.barbershop\.local$  $sub;
    default                           "";
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Redirect HTTP → HTTPS (production)
    # return 301 https://$host$request_uri;

    # ---- Connection Limits ----
    limit_conn conn_limit 50;
    client_max_body_size 20M;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss image/svg+xml;

    # ---- Security Headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-Download-Options "noopen" always;
    add_header Strict-Transport-Security $hsts_header always;

    # Content-Security-Policy
    add_header Content-Security-Policy "\
        default-src 'self'; \
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; \
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
        font-src 'self' https://fonts.gstatic.com; \
        img-src 'self' data: https: blob:; \
        connect-src 'self' https://*.barbershop.local wss://*.barbershop.local; \
        frame-ancestors 'none'; \
        form-action 'self'; \
        base-uri 'self'; \
        object-src 'none'" always;

    # Remove server header
    server_tokens off;
    more_clear_headers Server;

    # ---- Health Check (no logging) ----
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ---- Admin Panel (SPA) ----
    location /admin {
        alias /usr/share/nginx/html/admin;
        try_files $uri $uri/ /admin/index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";

        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- Public Site ----
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public";

        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- API (General) ----
    location /api/ {
        limit_req zone=api_limit burst=200 nodelay;
        limit_req_status 429;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Tenant-Subdomain $tenant_subdomain;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 5s;

        # Don't buffer responses
        proxy_buffering off;
    }

    # ---- API Auth (stricter rate limit) ----
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # ---- Payment Webhooks ----
    location /api/v1/payments/webhook/ {
        limit_req zone=webhook_limit burst=100 nodelay;
        limit_req_status 429;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Webhooks may need longer timeouts
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---- OpenAPI Docs (internal only in prod) ----
    location /docs {
        # In production, restrict to internal IPs or use basic auth
        # satisfy any;
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # allow 192.168.0.0/16;
        # deny all;
        # auth_basic "API Docs";
        # auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Metrics (Prometheus) ----
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ---- Deny hidden files ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- Deny sensitive paths ----
    location ~* (?:\.(?:bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)|~)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ============================================================
# AGENDA OS — CI/CD Pipeline (GitHub Actions)
# ============================================================
# Triggers on push to main. Builds, tests, and deploys.
#
# Secrets needed in GitHub:
#   SERVER_HOST, SERVER_USER, SSH_PRIVATE_KEY
#   DOCKER_REGISTRY (optional for image push)
# ============================================================

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---- Test ----
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-not-for-production
          APP_ENV: testing
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # ---- Build & Deploy ----
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd /opt/agendaos
            echo "[$(date)] Starting deploy..."

            # Pull latest code
            git pull origin main

            # Copy .env.production (managed outside Git for security)
            cp /etc/agendaos/.env.production .env.production

            # Build and restart
            docker compose -f docker-compose.prod.yml down --remove-orphans
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml --profile agents up -d

            # Cleanup old images
            docker system prune -f --filter "until=48h"

            # Health check
            sleep 5
            curl -sf http://localhost:8000/health && echo "[$(date)] Deploy OK" || echo "[$(date)] Health check failed"

  # ---- Notify ----
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Deploy status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Deploy successful — https://agendaos.com.br"
          else
            echo "❌ Deploy failed — check logs"
          fi

# ============================================================
# Barbershop SaaS — Docker Compose (Production)
# ============================================================
# Production deployment with resource limits, health checks,
# and observability stack.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml ps

name: barbershop-prod

services:
  # ============================================================
  # PostgreSQL 16 — Production Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: barbershop-prod-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432"  # Only localhost
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - barbershop-prod-net
    deploy:
      resources:
        limits:
          memory: ${DB_MEMORY_LIMIT:-2G}
          cpus: "${DB_CPU_LIMIT:-2.0}"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================
  # Redis 7 — Production Cache
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: barbershop-prod-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-1gb}
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - barbershop-prod-net
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-1G}
          cpus: "${REDIS_CPU_LIMIT:-1.0}"
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"

  # ============================================================
  # Backend API — Production (4 workers)
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: production
    image: ${DOCKER_REGISTRY:-barbershop}/backend:${IMAGE_TAG:-latest}
    container_name: barbershop-prod-backend
    restart: always
    env_file:
      - ./config/environments/.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      DATABASE_URL_SYNC: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      WORKERS: ${API_WORKERS:-4}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - barbershop-prod-net
    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-2G}
          cpus: "${API_CPU_LIMIT:-2.0}"
        reservations:
          memory: 512M
          cpus: "0.5"
      replicas: ${API_REPLICAS:-2}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================
  # Worker — Background Jobs (2 replicas)
  # ============================================================
  worker:
    build:
      context: ./backend
      dockerfile: ../docker/worker/Dockerfile
    image: ${DOCKER_REGISTRY:-barbershop}/worker:${IMAGE_TAG:-latest}
    container_name: barbershop-prod-worker
    restart: always
    env_file:
      - ./config/environments/.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - barbershop-prod-net
    deploy:
      resources:
        limits:
          memory: ${WORKER_MEMORY_LIMIT:-1G}
          cpus: "${WORKER_CPU_LIMIT:-1.0}"
      replicas: ${WORKER_REPLICAS:-2}
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"

  # ============================================================
  # Scheduler — Cron Jobs
  # ============================================================
  scheduler:
    build:
      context: ./backend
      dockerfile: ../docker/scheduler/Dockerfile
    image: ${DOCKER_REGISTRY:-barbershop}/scheduler:${IMAGE_TAG:-latest}
    container_name: barbershop-prod-scheduler
    restart: always
    env_file:
      - ./config/environments/.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - barbershop-prod-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ============================================================
  # Nginx — Reverse Proxy + Frontend Static Files
  # ============================================================
  nginx:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      target: production
      args:
        VITE_API_URL: ${PUBLIC_API_URL}
        VITE_APP_ENV: production
    image: ${DOCKER_REGISTRY:-barbershop}/frontend:${IMAGE_TAG:-latest}
    container_name: barbershop-prod-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - barbershop-prod-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"

  # ============================================================
  # Prometheus — Metrics Collection
  # ============================================================
  prometheus:
    image: prom/prometheus:v3.0
    container_name: barbershop-prod-prometheus
    restart: always
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_prod_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=20GB"
      - "--web.enable-admin-api"
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - barbershop-prod-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ============================================================
  # Grafana — Dashboards + Alerting
  # ============================================================
  grafana:
    image: grafana/grafana:11.3
    container_name: barbershop-prod-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3000}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ALERTING_ENABLED: "true"
    volumes:
      - grafana_prod_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - barbershop-prod-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ============================================================
  # Loki — Log Aggregation
  # ============================================================
  loki:
    image: grafana/loki:3.2
    container_name: barbershop-prod-loki
    restart: always
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_prod_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - barbershop-prod-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ============================================================
  # Promtail — Log Shipper
  # ============================================================
  promtail:
    image: grafana/promtail:3.2
    container_name: barbershop-prod-promtail
    restart: always
    volumes:
      - ./config/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - barbershop-prod-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ============================================================
  # Node Exporter — Host Metrics
  # ============================================================
  node-exporter:
    image: prom/node-exporter:v1.8
    container_name: barbershop-prod-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - barbershop-prod-net

  # ============================================================
  # AI Agents — Multi-Agent System (profile: agents)
  # ============================================================
  and-agent:
    build:
      context: ./repos/and
    container_name: barbershop-prod-and-agent
    restart: always
    ports:
      - "127.0.0.1:8001:8000"
    networks:
      - barbershop-prod-net
    profiles:
      - agents
      - full
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  hermes-agent:
    build:
      context: ./repos/hermes-agent
    container_name: barbershop-prod-hermes-agent
    restart: always
    ports:
      - "127.0.0.1:8002:8000"
    networks:
      - barbershop-prod-net
    profiles:
      - agents
      - full
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  evolver-agent:
    build:
      context: ./repos/evolver
    container_name: barbershop-prod-evolver-agent
    restart: always
    ports:
      - "127.0.0.1:8003:8000"
    networks:
      - barbershop-prod-net
    profiles:
      - agents
      - full
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  generic-agent:
    build:
      context: ./repos/generic-agent
    container_name: barbershop-prod-generic-agent
    restart: always
    ports:
      - "127.0.0.1:8004:8000"
    networks:
      - barbershop-prod-net
    profiles:
      - agents
      - full
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  claude-mem-agent:
    build:
      context: ./repos/claude-mem
    container_name: barbershop-prod-claude-mem-agent
    restart: always
    ports:
      - "127.0.0.1:8005:8000"
    networks:
      - barbershop-prod-net
    profiles:
      - agents
      - full
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_prod_data:
    name: barbershop-prod-postgres
  redis_prod_data:
    name: barbershop-prod-redis
  prometheus_prod_data:
    name: barbershop-prod-prometheus
  grafana_prod_data:
    name: barbershop-prod-grafana
  loki_prod_data:
    name: barbershop-prod-loki

networks:
  barbershop-prod-net:
    name: barbershop-prod-net
    driver: bridge

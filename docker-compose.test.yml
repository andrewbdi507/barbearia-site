# ============================================================
# Barbershop SaaS — Docker Compose (Testing)
# ============================================================
# Isolated environment for CI and local testing.
# No volumes, ephemeral databases.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   docker compose -f docker-compose.test.yml run --rm backend-test

name: barbershop-test

services:
  # ============================================================
  # PostgreSQL 16 — Test DB (ephemeral)
  # ============================================================
  postgres-test:
    image: postgres:16-alpine
    container_name: barbershop-test-postgres
    restart: "no"
    environment:
      POSTGRES_USER: barbershop_test
      POSTGRES_PASSWORD: barbershop_test
      POSTGRES_DB: barbershop_test
    tmpfs:
      - /var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barbershop_test -d barbershop_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - barbershop-test-net

  # ============================================================
  # Redis 7 — Test Cache (ephemeral)
  # ============================================================
  redis-test:
    image: redis:7-alpine
    container_name: barbershop-test-redis
    restart: "no"
    command: redis-server --save "" --appendonly no
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - barbershop-test-net

  # ============================================================
  # Test Runner
  # ============================================================
  backend-test:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: development
    container_name: barbershop-test-runner
    restart: "no"
    environment:
      APP_ENV: testing
      DATABASE_URL: postgresql+asyncpg://barbershop_test:barbershop_test@postgres-test:5432/barbershop_test
      DATABASE_URL_SYNC: postgresql://barbershop_test:barbershop_test@postgres-test:5432/barbershop_test
      REDIS_URL: redis://redis-test:6379/0
      SECRET_KEY: test-secret-key-not-for-production-use
      LOG_LEVEL: WARNING
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    command: >
      uv run pytest -v
      --cov=app
      --cov-report=term-missing
      --cov-report=xml:/app/reports/coverage.xml
      --cov-report=html:/app/reports/coverage-html
      --junitxml=/app/reports/junit.xml
      -n auto
    volumes:
      - ./backend:/app
      - ./reports:/app/reports
    networks:
      - barbershop-test-net

networks:
  barbershop-test-net:
    name: barbershop-test-net
    driver: bridge

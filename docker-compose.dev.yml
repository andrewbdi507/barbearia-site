# ============================================================
# Barbershop SaaS — Docker Compose (Development)
# ============================================================
# Full local development environment with hot-reload.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down
#   docker compose -f docker-compose.dev.yml logs -f backend

name: barbershop-dev

services:
  # ============================================================
  # PostgreSQL 16
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: barbershop-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: barbershop
      POSTGRES_PASSWORD: ${DB_PASSWORD:-barbershop_dev}
      POSTGRES_DB: barbershop_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./backend/docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barbershop -d barbershop_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - barbershop-dev-net

  # ============================================================
  # Redis 7 — Cache + Queue
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: barbershop-dev-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-barbershop_dev}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-barbershop_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - barbershop-dev-net

  # ============================================================
  # Backend API — FastAPI (hot-reload)
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: development
    container_name: barbershop-dev-backend
    restart: unless-stopped
    env_file:
      - ./config/environments/.env.dev
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: barbershop
      DB_PASSWORD: ${DB_PASSWORD:-barbershop_dev}
      DB_NAME: barbershop_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-barbershop_dev}
      APP_ENV: development
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uv run uvicorn app.presentation.api.app:create_app
      --factory --host 0.0.0.0 --port 8000 --reload
    networks:
      - barbershop-dev-net

  # ============================================================
  # Frontend — Admin Panel (Vite dev server)
  # ============================================================
  frontend-admin:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile.dev
    container_name: barbershop-dev-frontend-admin
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_APP_ENV: development
    ports:
      - "${ADMIN_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: pnpm dev:admin --host 0.0.0.0
    networks:
      - barbershop-dev-net
    profiles:
      - full

  # ============================================================
  # Nginx — Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: barbershop-dev-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend-admin
    networks:
      - barbershop-dev-net
    profiles:
      - full

  # ============================================================
  # Worker — Background Jobs
  # ============================================================
  worker:
    build:
      context: ./backend
      dockerfile: ../docker/worker/Dockerfile
    container_name: barbershop-dev-worker
    restart: unless-stopped
    env_file:
      - ./config/environments/.env.dev
    environment:
      DATABASE_URL: postgresql+asyncpg://barbershop:${DB_PASSWORD:-barbershop_dev}@postgres:5432/barbershop_dev
      REDIS_URL: redis://:${REDIS_PASSWORD:-barbershop_dev}@redis:6379/1
      APP_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - barbershop-dev-net
    profiles:
      - full

  # ============================================================
  # Scheduler — Cron Jobs
  # ============================================================
  scheduler:
    build:
      context: ./backend
      dockerfile: ../docker/scheduler/Dockerfile
    container_name: barbershop-dev-scheduler
    restart: unless-stopped
    env_file:
      - ./config/environments/.env.dev
    environment:
      DATABASE_URL: postgresql+asyncpg://barbershop:${DB_PASSWORD:-barbershop_dev}@postgres:5432/barbershop_dev
      REDIS_URL: redis://:${REDIS_PASSWORD:-barbershop_dev}@redis:6379/2
      APP_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - barbershop-dev-net
    profiles:
      - full

  # ============================================================
  # AND Agent — Advanced Reasoning & Learning
  # ============================================================
  and-agent:
    build:
      context: ./repos/and
    container_name: barbershop-dev-and-agent
    restart: unless-stopped
    environment:
      AGENT_NAME: and
      AGENT_PORT: "8000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${AND_AGENT_PORT:-8001}:8000"
    networks:
      - barbershop-dev-net
    profiles:
      - agents
      - full

  # ============================================================
  # Hermes Agent — Planning & Execution
  # ============================================================
  hermes-agent:
    build:
      context: ./repos/hermes-agent
    container_name: barbershop-dev-hermes-agent
    restart: unless-stopped
    environment:
      AGENT_NAME: hermes
      AGENT_PORT: "8000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${HERMES_AGENT_PORT:-8002}:8000"
    networks:
      - barbershop-dev-net
    profiles:
      - agents
      - full

  # ============================================================
  # Evolver Agent — Strategy Optimization
  # ============================================================
  evolver-agent:
    build:
      context: ./repos/evolver
    container_name: barbershop-dev-evolver-agent
    restart: unless-stopped
    environment:
      AGENT_NAME: evolver
      AGENT_PORT: "8000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${EVOLVER_AGENT_PORT:-8003}:8000"
    networks:
      - barbershop-dev-net
    profiles:
      - agents
      - full

  # ============================================================
  # Generic Agent — Task Orchestration
  # ============================================================
  generic-agent:
    build:
      context: ./repos/generic-agent
    container_name: barbershop-dev-generic-agent
    restart: unless-stopped
    environment:
      AGENT_NAME: generic
      AGENT_PORT: "8000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${GENERIC_AGENT_PORT:-8004}:8000"
    networks:
      - barbershop-dev-net
    profiles:
      - agents
      - full

  # ============================================================
  # Claude-Mem Agent — Long-term Memory
  # ============================================================
  claude-mem-agent:
    build:
      context: ./repos/claude-mem
    container_name: barbershop-dev-claude-mem-agent
    restart: unless-stopped
    environment:
      AGENT_NAME: claude-mem
      AGENT_PORT: "8000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${CLAUDE_MEM_AGENT_PORT:-8005}:8000"
    networks:
      - barbershop-dev-net
    profiles:
      - agents
      - full

volumes:
  postgres_dev_data:
    name: barbershop-dev-postgres
  redis_dev_data:
    name: barbershop-dev-redis

networks:
  barbershop-dev-net:
    name: barbershop-dev-net
    driver: bridge

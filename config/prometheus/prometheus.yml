# ============================================================
# Prometheus Configuration — Barbershop SaaS
# ============================================================

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    environment: "${APP_ENV:-production}"
    service: barbershop-saas

# Alert rules
rule_files:
  - "/etc/prometheus/alerts.yml"

# Scrape targets
scrape_configs:
  # ---- Backend API ----
  - job_name: "backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:8000"]
        labels:
          component: api
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "backend"

  # ---- Nginx ----
  - job_name: "nginx"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["nginx:80"]
        labels:
          component: proxy

  # ---- Node Exporter (Host metrics) ----
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          component: host

  # ---- PostgreSQL (requires postgres_exporter sidecar) ----
  # - job_name: "postgresql"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]
  #       labels:
  #         component: database

  # ---- Redis (requires redis_exporter sidecar) ----
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
  #       labels:
  #         component: cache

  # ---- Prometheus self-monitoring ----
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

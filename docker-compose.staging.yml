# ============================================================
# Barbershop SaaS — Docker Compose (Staging)
# ============================================================
# Pre-production environment. Mirrors production but with
# debug logging enabled and smaller resource limits.
#
# Usage:
#   docker compose -f docker-compose.staging.yml up -d

name: barbershop-staging

services:
  # ============================================================
  # PostgreSQL 16 — Staging Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: barbershop-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-barbershop_stg}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-barbershop_staging}
    ports:
      - "5432:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-barbershop_stg}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - barbershop-staging-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ============================================================
  # Redis 7 — Staging Cache
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: barbershop-staging-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - barbershop-staging-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ============================================================
  # Backend API — Staging (2 workers)
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: production
    container_name: barbershop-staging-backend
    restart: unless-stopped
    env_file:
      - ./config/environments/.env.staging
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-barbershop_stg}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-barbershop_staging}
      DATABASE_URL_SYNC: postgresql://${DB_USER:-barbershop_stg}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-barbershop_staging}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      APP_ENV: staging
      LOG_LEVEL: INFO
      WORKERS: 2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - barbershop-staging-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ============================================================
  # Worker — Background Jobs
  # ============================================================
  worker:
    build:
      context: ./backend
      dockerfile: ../docker/worker/Dockerfile
    container_name: barbershop-staging-worker
    restart: unless-stopped
    env_file:
      - ./config/environments/.env.staging
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-barbershop_stg}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-barbershop_staging}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      APP_ENV: staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - barbershop-staging-net

  # ============================================================
  # Scheduler — Cron Jobs
  # ============================================================
  scheduler:
    build:
      context: ./backend
      dockerfile: ../docker/scheduler/Dockerfile
    container_name: barbershop-staging-scheduler
    restart: unless-stopped
    env_file:
      - ./config/environments/.env.staging
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-barbershop_stg}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-barbershop_staging}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      APP_ENV: staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - barbershop-staging-net

  # ============================================================
  # Nginx — Reverse Proxy + Frontend
  # ============================================================
  nginx:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      target: production
      args:
        VITE_API_URL: https://api-staging.barbershop.local
        VITE_APP_ENV: staging
    container_name: barbershop-staging-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - barbershop-staging-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ============================================================
  # Observability Stack (Staging)
  # ============================================================
  prometheus:
    image: prom/prometheus:v3.0
    container_name: barbershop-staging-prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_staging_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    networks:
      - barbershop-staging-net

  grafana:
    image: grafana/grafana:11.3
    container_name: barbershop-staging-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_staging_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - barbershop-staging-net

volumes:
  postgres_staging_data:
    name: barbershop-staging-postgres
  redis_staging_data:
    name: barbershop-staging-redis
  prometheus_staging_data:
    name: barbershop-staging-prometheus
  grafana_staging_data:
    name: barbershop-staging-grafana

networks:
  barbershop-staging-net:
    name: barbershop-staging-net
    driver: bridge
